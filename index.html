<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Little Jar of Wishes ✨</title>
  <!-- Canvas Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Poppins:wght@300;400;500&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #faf4ee;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      color: #5a4e4d;
    }

    /* Soft ambient background glow */
    .bg-glow {
      position: absolute;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(255, 223, 211, 0.8) 0%, rgba(250, 244, 238, 0) 70%);
      z-index: 0;
      pointer-events: none;
    }

    /* Header Styling */
    .header {
      text-align: center;
      z-index: 1;
      margin-bottom: 20px;
    }

    .header h1 {
      font-family: 'Caveat', cursive;
      font-size: 2.8rem;
      color: #8b5e66;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 0.95rem;
      color: #a08886;
      letter-spacing: 0.5px;
    }

    /* Jar Container */
    .jar-container {
      position: relative;
      z-index: 1;
      cursor: pointer;
      margin: 20px 0;
      transition: transform 0.2s ease;
    }

    .jar-container:hover {
      transform: scale(1.03);
    }

    /* Shake Animation on Click */
    .shake {
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(-6deg); }
      40% { transform: rotate(6deg); }
      60% { transform: rotate(-4deg); }
      80% { transform: rotate(4deg); }
    }

    /* Aesthetic Glass Jar SVG */
    .jar-svg {
      width: 180px;
      height: 250px;
      filter: drop-shadow(0 10px 15px rgba(139, 94, 102, 0.15));
    }

    /* Counter Indicator */
    .counter {
      text-align: center;
      font-size: 0.85rem;
      color: #b59b99;
      margin-top: 5px;
      z-index: 1;
    }

    /* Pop-out Wish Card Modal Overlay */
    .card-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(90, 78, 77, 0.3);
      backdrop-filter: blur(4px);
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 20px;
    }

    .card-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Cozy Note Card */
    .wish-card {
      background: #ffffff;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      padding: 30px 25px;
      box-shadow: 0 15px 35px rgba(139, 94, 102, 0.2);
      border: 2px solid #f2e3dd;
      text-align: center;
      transform: translateY(20px) scale(0.95);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }

    .card-overlay.active .wish-card {
      transform: translateY(0) scale(1);
    }

    .wish-card .decor-sticker {
      font-size: 2rem;
      margin-bottom: 15px;
      display: block;
    }

    .wish-card p {
      font-family: 'Caveat', cursive;
      font-size: 1.8rem;
      color: #5a4e4d;
      line-height: 1.4;
      margin-bottom: 25px;
    }

    .next-btn {
      background: #e8b4b8;
      color: #ffffff;
      border: none;
      padding: 10px 24px;
      border-radius: 20px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(232, 180, 184, 0.4);
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .next-btn:hover {
      background: #d89fa3;
      transform: translateY(-2px);
    }

    /* Final Birthday Card Theme */
    .wish-card.birthday-theme {
      background: linear-gradient(135deg, #fffaf6 0%, #ffeef2 100%);
      border-color: #e8b4b8;
    }

    .wish-card.birthday-theme p {
      color: #8b5e66;
      font-size: 2rem;
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <div class="header">
    <h1>A Little Jar of Wishes ✨</h1>
    <p>Tap the jar to draw a note!</p>
  </div>

  <!-- Glass Jar SVG -->
  <div class="jar-container" id="jarContainer" onclick="drawWish()">
    <svg class="jar-svg" viewBox="0 0 100 140" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Cork Lid -->
      <path d="M32 12C32 8.68629 34.6863 6 38 6H62C65.3137 6 68 8.68629 68 12V18H32V12Z" fill="#CBB299"/>
      <path d="M28 18C28 16.8954 28.8954 16 30 16H70C71.1046 16 72 16.8954 72 18V22H28V18Z" fill="#B2977D"/>
      <!-- Glass Body -->
      <path d="M22 28C22 24.6863 24.6863 22 28 22H72C75.3137 22 78 24.6863 78 28V32C78 35.3137 82 38 82 42V120C82 128.837 74.8366 136 66 136H34C25.1634 136 18 128.837 18 120V42C18 38 22 35.3137 22 32V28Z" fill="#E8F4F8" fill-opacity="0.45" stroke="#D1E5ED" stroke-width="2"/>
      <!-- Wooden Tag on String -->
      <path d="M50 22L45 50" stroke="#B2977D" stroke-width="1.2" stroke-dasharray="2 2"/>
      <rect x="30" y="50" width="40" height="22" rx="4" fill="#F3E5D8" stroke="#D8C2B0" stroke-width="1"/>
      <text x="50" y="64" font-family="Caveat" font-size="8" fill="#8B5E66" text-anchor="middle" font-weight="bold">Open Me ❤️</text>
      <!-- Little Folding Paper Notes Inside -->
      <rect x="30" y="105" width="16" height="12" rx="2" transform="rotate(-15 30 105)" fill="#F7D6D8"/>
      <rect x="52" y="110" width="18" height="12" rx="2" transform="rotate(10 52 110)" fill="#E2EFCB"/>
      <rect x="40" y="98" width="16" height="12" rx="2" transform="rotate(-5 40 98)" fill="#FFF3CD"/>
      <rect x="25" y="115" width="20" height="10" rx="2" transform="rotate(20 25 115)" fill="#D0E8F2"/>
      <rect x="58" y="100" width="16" height="12" rx="2" transform="rotate(-25 58 100)" fill="#F7D6D8"/>
      <!-- Glass Reflection -->
      <path d="M24 45C24 45 23 80 24 110" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    </svg>
  </div>

  <div class="counter" id="counterText">Notes left in jar: 5</div>

  <!-- Pop-up Card Overlay -->
  <div class="card-overlay" id="cardOverlay">
    <div class="wish-card" id="wishCard">
      <span class="decor-sticker" id="cardSticker">🌸</span>
      <p id="cardText">Your secret note goes here...</p>
      <button class="next-btn" onclick="closeCard()">Keep Secret 💌</button>
    </div>
  </div>

  <script>
    // EDIT YOUR CUSTOM NOTES HERE!
    const wishes = [
      { text: "Thank you for hearing me everytime like all the nonsenses and criesss 🌷", sticker: "💌" },
      { text: "Remember our late night laughters and many Aradhana Babu's getting jealous of our happinesssss 😂", sticker: "📸" },
      { text: "You have the prettiestt smileeee, don't let bullies and negative ppl ruin it at any cost!!! Don't ever change! ✨", sticker: "⭐" },
      { text: "I have been not a great friend to you, but I alwaays cherish our friendship and hope our friendship perishes and becomes stronger, i hope you won't find me and my ways annoying or frustrating... ☕", sticker: "🧸" },
      // The final birthday wish will always show last!
      { text: "And most importantly... Happy Birthday Faaaaa!! May this year bring you endless magic! 🎉🎂", sticker: "🎁", isFinal: true }
    ];

    let currentIndex = 0;

    function drawWish() {
      if (currentIndex >= wishes.length) return;

      const jar = document.getElementById('jarContainer');
      
      // Trigger shake animation
      jar.classList.add('shake');
      setTimeout(() => jar.classList.remove('shake'), 400);

      // Display card after short delay
      setTimeout(() => {
        const wish = wishes[currentIndex];
        const cardText = document.getElementById('cardText');
        const cardSticker = document.getElementById('cardSticker');
        const wishCard = document.getElementById('wishCard');

        cardText.innerText = wish.text;
        cardSticker.innerText = wish.sticker;

        if (wish.isFinal) {
          wishCard.classList.add('birthday-theme');
          // Trigger confetti blast on the final birthday message!
          confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 }
          });
        }

        document.getElementById('cardOverlay').classList.add('active');
      }, 300);
    }

    function closeCard() {
      document.getElementById('cardOverlay').classList.remove('active');
      
      currentIndex++;
      const remaining = wishes.length - currentIndex;
      const counterText = document.getElementById('counterText');

      if (remaining > 0) {
        counterText.innerText = `Notes left in jar: ${remaining}`;
      } else {
        counterText.innerText = "The jar is empty! ❤️";
      }
    }
  </script>
</body>
</html>
